<!-- 
  PLACEHOLDER SVG para Profile Image
  
  Guarda este archivo como: assets/profile.jpg
  O usa tu propia foto de perfil
  
  Mientras tanto, el navbar mostrará las iniciales "TN"
  configuradas en el HTML
-->

<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#grad)"/>
  <circle cx="100" cy="80" r="35" fill="rgba(255,255,255,0.2)"/>
  <path d="M 100 115 Q 70 125, 60 140 L 140 140 Q 130 125, 100 115" fill="rgba(255,255,255,0.2)"/>
</svg>

